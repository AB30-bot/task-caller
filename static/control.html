<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Task Caller</title>

  <!-- PWA / iPhone "Add to Home Screen" — installs as a standalone app -->
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Task Caller" />
  <link rel="apple-touch-icon" href="/static/icon-180.png" />
  <link rel="icon" type="image/png" href="/static/icon-192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f8f7; color: #1a1a1a; min-height: 100vh; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: #fff; border-bottom: 1px solid #e8e8e6; position: sticky; top: 0; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 28px; height: 28px; border-radius: 6px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 14px; height: 14px; fill: #fff; }
    .logo-text { font-size: 15px; font-weight: 500; }
    .sub { font-size: 12px; color: #888; }
    .compose { padding: 16px 20px; background: #fff; border-bottom: 1px solid #e8e8e6; }
    .section-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    textarea { width: 100%; min-height: 80px; resize: vertical; font-size: 14px; padding: 10px 12px; border: 1px solid #e0e0de; border-radius: 8px; background: #f8f8f7; color: #1a1a1a; font-family: inherit; margin-bottom: 10px; line-height: 1.5; }
    textarea:focus, input:focus { outline: none; border-color: #1a1a1a; }
    .row { display: flex; gap: 10px; align-items: center; }
    .input-wrap { position: relative; flex: 1; }
    .input-wrap input { width: 100%; padding: 9px 12px 9px 34px; font-size: 14px; border: 1px solid #e0e0de; border-radius: 8px; background: #f8f8f7; color: #1a1a1a; font-family: inherit; }
    .input-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; fill: #25d366; }
    .send-btn { padding: 9px 18px; font-size: 14px; font-weight: 500; border-radius: 8px; background: #1a1a1a; color: #fff; border: none; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .send-btn:disabled { opacity: .5; cursor: not-allowed; }
    .send-btn svg { width: 14px; height: 14px; fill: #fff; }
    .feed { padding: 16px 20px; }
    .job-card { border: 1px solid #e8e8e6; border-radius: 12px; background: #fff; margin-bottom: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
    .job-card:hover { border-color: #ccc; }
    .job-header { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #f0f0ee; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .avatar svg { width: 16px; height: 16px; fill: #888; }
    .job-meta { flex: 1; min-width: 0; }
    .job-top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
    .contact { font-size: 13px; font-weight: 500; }
    .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 999px; }
    .badge-waiting { background: #faeeda; color: #854f0b; }
    .badge-live { background: #e6f1fb; color: #185fa5; }
    .badge-done { background: #eaf3de; color: #3b6d11; }
    .badge-failed { background: #fcebeb; color: #a32d2d; }
    .pulse { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #378add; animation: pulse 1.2s infinite; }
    .job-task { font-size: 13px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-summary { font-size: 13px; color: #1a1a1a; font-style: italic; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .job-time { font-size: 11px; color: #aaa; }
    .chevron { width: 14px; height: 14px; fill: #ccc; }
    .job-body { border-top: 1px solid #f0f0ee; padding: 12px 14px; background: #f8f8f7; }
    .body-label { font-size: 11px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .transcript { font-size: 13px; color: #1a1a1a; white-space: pre-wrap; line-height: 1.6; font-family: inherit; }
    .summary-block { margin-bottom: 12px; padding: 10px 12px; background: #fff; border-radius: 8px; border: 1px solid #e8e8e6; }
    .info-note { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; }
    .info-note svg { width: 14px; height: 14px; fill: #ccc; flex-shrink: 0; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a1a; color: #fff; font-size: 13px; padding: 10px 16px; border-radius: 8px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; }
    .empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 14px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      </div>
      <span class="logo-text">Task Caller</span>
    </div>
    <span class="sub">Adam's dashboard</span>
  </div>

  <div class="compose">
    <div class="section-label">New call</div>
    <textarea id="taskInput" placeholder="What should the AI do on this call? e.g. Ask how their day went and find out if they're free Saturday."></textarea>
    <div class="row">
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        <input type="tel" id="contactInput" placeholder="+1 555 000 000 — WhatsApp number" />
      </div>
      <button class="send-btn" id="sendBtn" onclick="createJob()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        Send link
      </button>
    </div>
  </div>

  <div class="feed">
    <div class="section-label">Recent calls</div>
    <div id="jobsFeed"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let expanded = null;
    let jobs = [];

    function timeAgo(iso) {
      const d = new Date(iso + 'Z');
      const s = Math.floor((Date.now() - d) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return Math.floor(s / 86400) + 'd ago';
    }

    function badgeClass(s) { return 'badge badge-' + s; }
    function badgeLabel(s) { return { waiting: 'link sent', live: 'live', done: 'done', failed: 'failed' }[s] || s; }

    function chevronUp() { return `<svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>`; }
    function chevronDown() { return `<svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>`; }

    function renderJobs() {
      const feed = document.getElementById('jobsFeed');
      if (!jobs.length) {
        feed.innerHTML = '<div class="empty">No calls yet. Create your first above.</div>';
        return;
      }
      feed.innerHTML = jobs.map(j => {
        const isExp = expanded === j.id;
        const summaryFirstLine = j.summary ? j.summary.split('\n')[0] : '';
        return `<div class="job-card" onclick="toggle('${j.id}')">
          <div class="job-header">
            <div class="avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>
            <div class="job-meta">
              <div class="job-top">
                <span class="contact">${j.contact}</span>
                <span class="${badgeClass(j.status)}">${badgeLabel(j.status)}</span>
                ${j.status === 'live' ? '<span class="pulse"></span>' : ''}
              </div>
              <div class="job-task">${j.task}</div>
              ${summaryFirstLine ? `<div class="job-summary">"${summaryFirstLine}"</div>` : ''}
            </div>
            <div class="job-right">
              <span class="job-time">${timeAgo(j.created_at)}</span>
              ${isExp ? chevronUp() : chevronDown()}
            </div>
          </div>
          ${isExp ? `<div class="job-body">
            ${j.summary ? `<div class="body-label">Summary</div><div class="summary-block"><div class="transcript">${j.summary}</div></div>` : ''}
            ${j.transcript ? `<div class="body-label">Transcript</div><div class="transcript">${j.transcript}</div>` : `
            <div class="info-note">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
              ${j.status === 'waiting' ? 'Waiting for them to tap the link.' : j.status === 'live' ? 'Call in progress…' : 'No transcript available.'}
            </div>`}
          </div>` : ''}
        </div>`;
      }).join('');
    }

    function toggle(id) { expanded = expanded === id ? null : id; renderJobs(); }

    async function loadJobs() {
      try {
        const r = await fetch('/control/jobs');
        if (r.ok) { jobs = await r.json(); renderJobs(); }
      } catch (_) {}
    }

    async function createJob() {
      const task = document.getElementById('taskInput').value.trim();
      const contact = document.getElementById('contactInput').value.trim();
      if (!task || !contact) { showToast('Fill in both fields.'); return; }
      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      try {
        const r = await fetch('/control/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, contact }),
        });
        if (r.ok) {
          document.getElementById('taskInput').value = '';
          document.getElementById('contactInput').value = '';
          showToast('Link sent via WhatsApp!');
          await loadJobs();
        } else {
          const err = await r.json().catch(() => ({}));
          showToast(err.detail || 'Failed to create job.');
        }
      } catch (_) { showToast('Server error.'); }
      btn.disabled = false;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadJobs();
    setInterval(loadJobs, 3000);
  </script>
</body>
</html>
